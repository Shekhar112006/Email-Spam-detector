<!DOCTYPE html>
<html>
<head>
<title>SpamShield AI Control Room</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: radial-gradient(circle at center, #020617, #000);
    font-family: 'Segoe UI', sans-serif;
    color: white;
    overflow: hidden;
}

/* CENTER AI CORE */
.core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 300px;
    height: 300px;
    border-radius: 50%;

    background: radial-gradient(circle, rgba(34,197,94,0.3), transparent);
    border: 2px solid rgba(34,197,94,0.6);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    box-shadow: 0 0 50px rgba(34,197,94,0.4);
}

/* RESULT TEXT */
.result {
    font-size: 28px;
    font-weight: bold;
}

.spam { color: #ef4444; }
.ham { color: #22c55e; }

/* FLOATING PANELS */
.panel {
    position: absolute;
    width: 250px;
    height: 160px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 12px;

    padding: 10px;

    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* POSITIONS */
.top-left { top: 5%; left: 5%; }
.top-right { top: 5%; right: 5%; }
.bottom-left { bottom: 5%; left: 5%; }
.bottom-right { bottom: 5%; right: 5%; }

/* INPUT */
textarea {
    width: 100%;
    height: 60px;
    border-radius: 8px;
    border: none;
    padding: 6px;
    background: rgba(255,255,255,0.1);
    color: white;
}

/* BUTTON */
button {
    margin-top: 5px;
    padding: 5px 10px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: white;
    cursor: pointer;
}

/* KPI */
.kpi {
    display: flex;
    justify-content: space-around;
    margin-top: 10px;
}

/* CHART */
canvas {
    height: 80px !important;
}

/* HISTORY */
table {
    width: 100%;
    font-size: 11px;
}

td {
    padding: 3px;
}

</style>
</head>

<body>

<!-- AI CORE -->
<div class="core">
    <div>🧠 AI Engine</div>

    {% if prediction %}
        <div class="result {{ 'spam' if prediction=='Spam' else 'ham' }}">
            {{ prediction }}
        </div>
        <div>{{ prob }}%</div>
    {% else %}
        <div>Waiting...</div>
    {% endif %}
</div>

<!-- INPUT PANEL -->
<div class="panel top-left">
    <h4>📩 Scan Email</h4>
    <form method="POST">
        <textarea name="message"></textarea>
        <button>Analyze</button>
    </form>
</div>

<!-- KPI PANEL -->
<div class="panel top-right">
    <h4>📊 Stats</h4>
    <div class="kpi">
        <div>Spam<br>{{ spam_count }}</div>
        <div>Safe<br>{{ ham_count }}</div>
    </div>
</div>

<!-- PIE -->
<div class="panel bottom-left">
    <h4>Distribution</h4>
    <div id="data"
         data-spam="{{ spam_count }}"
         data-ham="{{ ham_count }}">
    </div>
    <canvas id="pieChart"></canvas>
</div>

<!-- HISTORY -->
<div class="panel bottom-right">
    <h4>Recent</h4>
    <table>
        {% for item in history %}
        <tr>
            <td>{{ item.text[:20] }}...</td>
            <td class="{{ 'spam' if item.result=='Spam' else 'ham' }}">
                {{ item.result }}
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
const dataDiv = document.getElementById("data");
let spam = parseInt(dataDiv.getAttribute("data-spam")) || 0;
let ham = parseInt(dataDiv.getAttribute("data-ham")) || 0;

new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: {
        labels: ["Spam", "Safe"],
        datasets: [{
            data: [spam, ham],
            backgroundColor: ["#ef4444", "#22c55e"]
        }]
    }
});
</script>

</body>
</html>
