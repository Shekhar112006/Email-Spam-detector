<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            padding: 30px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .result {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card bg-white">
    <h2 class="title">📧 Spam Detector</h2>

    <form action="/predict_form" method="post">
        <div class="mb-3">
            <input type="text" name="message" class="form-control" placeholder="Enter your message..." required>
        </div>

        <div class="d-grid">
            <button class="btn btn-primary">Check Message</button>
        </div>
    </form>

    {% if prediction is not none %}
        <div class="result">
            {% if prediction == "Spam" %}
                <span class="text-danger">🚫 Spam Message</span>
            {% else %}
                <span class="text-success">✅ Not Spam</span>
            {% endif %}
        </div>
    {% endif %}
</div>

</body>
</html>
