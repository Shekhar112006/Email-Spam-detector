<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #dbeafe, #f0f9ff);
            margin: 0;
            transition: 0.3s;
        }

        .dark-mode {
            background: #0f172a;
            color: white;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: rgba(255,255,255,0.9);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .dark-mode .card {
            background: rgba(30,41,59,0.9);
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #loader {
            display: none;
        }

        .chart-container {
            width: 100%;
            max-width: 400px;
            height: 300px;
            margin: auto;
        }
    </style>
</head>

<body>

<div class="container">

    <button onclick="toggleMode()">🌙 Toggle Mode</button>

    <div class="card">
        <h2>📧 Email Spam Detector</h2>
        <p>"Smart filtering powered by AI"</p>

        <form method="POST" onsubmit="showLoader()">
            <textarea name="message" required></textarea>
            <br><br>
            <button type="submit">Predict</button>
        </form>

        <div id="loader">⏳ Checking...</div>

        {% if prediction %}
            <h3>Result: {{ prediction }}</h3>
            <p>Confidence: {{ prob }}%</p>
        {% endif %}
    </div>

    <!-- HISTORY -->
    <div class="card">
        <h3>Last 5 Predictions</h3>
        <ul>
            {% for item in history %}
                <li>{{ item.text }} → <b>{{ item.result }}</b></li>
            {% endfor %}
        </ul>
    </div>

    <!-- CHART -->
    <div class="card">
        <h3>Spam vs Not Spam</h3>

        <!-- Safe data passing -->
        <div id="data"
             data-spam="{{ spam_count }}"
             data-ham="{{ ham_count }}">
        </div>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark-mode");
}

function showLoader() {
    document.getElementById("loader").style.display = "block";
}

// GET DATA SAFELY
const dataDiv = document.getElementById("data");
var spamCount = parseInt(dataDiv.getAttribute("data-spam")) || 0;
var hamCount = parseInt(dataDiv.getAttribute("data-ham")) || 0;

// CREATE CHART
window.onload = function () {
    new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: ["Spam", "Not Spam"],
            datasets: [{
                data: [spamCount, hamCount]
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
};
</script>

</body>
</html>
