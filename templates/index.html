<!DOCTYPE html>
<html>
<head>
<title>SpamShield AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #0f172a);
    color: white;
    overflow: hidden;
}

/* NAVBAR */
.navbar {
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

/* MAIN GRID */
.container {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 15px;
    padding: 15px;
    height: calc(100vh - 60px);
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.02);
}

/* INPUT */
textarea {
    width: 100%;
    height: 70px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: white;
    cursor: pointer;
}

/* CHART FIX */
.chart {
    height: 200px;
}

/* RESULT COLORS */
.spam { color: #ef4444; }
.ham { color: #22c55e; }

/* TABLE */
table {
    width: 100%;
    font-size: 12px;
}

td {
    padding: 5px;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>🛡 SpamShield AI Dashboard</h2>
</div>

<div class="container">

<!-- LEFT TOP -->
<div class="card">
    <h3>Email Scanner</h3>

    <form method="POST">
        <textarea name="message" placeholder="Paste email here..."></textarea>
        <button type="submit">Scan</button>
    </form>

    {% if prediction %}
        <h3 class="{{ 'spam' if prediction=='Spam' else 'ham' }}">
            {{ prediction }} ({{ prob }}%)
        </h3>
    {% endif %}
</div>

<!-- LEFT BOTTOM -->
<div class="card">
    <h3>Detection Trend</h3>
    <canvas id="lineChart" class="chart"></canvas>
</div>

<!-- RIGHT TOP -->
<div class="card">
    <h3>Spam Distribution</h3>

    <div id="data"
         data-spam="{{ spam_count }}"
         data-ham="{{ ham_count }}">
    </div>

    <canvas id="pieChart" class="chart"></canvas>
</div>

<!-- RIGHT BOTTOM -->
<div class="card">
    <h3>Recent Activity</h3>

    <table>
        {% for item in history %}
        <tr>
            <td>{{ item.text[:20] }}...</td>
            <td class="{{ 'spam' if item.result=='Spam' else 'ham' }}">
                {{ item.result }}
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</div>

<script>
// DATA
const dataDiv = document.getElementById("data");
let spam = parseInt(dataDiv.getAttribute("data-spam")) || 0;
let ham = parseInt(dataDiv.getAttribute("data-ham")) || 0;

// PIE
new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: {
        labels: ["Spam", "Safe"],
        datasets: [{
            data: [spam, ham],
            backgroundColor: ["#ef4444", "#22c55e"]
        }]
    }
});

// LINE
new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
        labels: ["Mon","Tue","Wed","Thu","Fri"],
        datasets: [{
            label: "Emails",
            data: [12, 19, 10, 15, 20],
            borderColor: "#60a5fa",
            backgroundColor: "rgba(96,165,250,0.2)",
            fill: true
        }]
    }
});
</script>

</body>
</html>
